*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(180deg,#0B1120 0%,#0F1A35 50%,#0B1120 100%);background-attachment:fixed;color:#C8D6E5;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input[type=number],input[type=text]{background:#0B1120;border:1.5px solid #1A2744;color:#fff;border-radius:8px;padding:8px 12px;font-size:14px;font-weight:600;outline:none;transition:border 0.2s}
input[type=number]{font-size:18px;font-weight:700;width:130px;text-align:center}
input[type=number]:focus,input[type=text]:focus{border-color:#6C5CE7}

.chip{cursor:pointer;user-select:none;transition:transform 0.12s ease,box-shadow 0.18s ease,background 0.15s ease,border-color 0.15s ease}
.chip:active{transform:scale(0.95)!important}

.btn{cursor:pointer;transition:all 0.15s ease;user-select:none}

.macro-seg{transition:filter 0.2s ease}

.fade-in{animation:fadeIn 0.2s ease}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0B1120}
::-webkit-scrollbar-thumb{background:#1A2744;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#6C5CE7}

function ExtraForm({ onAdd }) {
  const [d, setD] = useState(""); const [k, setK] = useState(""); const [p, setP] = useState(""); const [c, setC] = useState(""); const [f, setF] = useState("");
  const submit = () => { if (!String(k).trim() && !d.trim()) return; onAdd(d, k, p, c, f); setD(""); setK(""); setP(""); setC(""); setF(""); };
  const inpN = { background: "#0B1120", border: "1.5px solid #1A2744", color: "#fff", borderRadius: 6, padding: "7px 4px", fontSize: 13, flex: 1, minWidth: 0, textAlign: "center", fontWeight: 600, outline: "none", width: "100%" };
  return (
    <div style={{ marginTop: 8, padding: 10, background: "#0B1120", borderRadius: 8 }}>
      <input value={d} onChange={e => setD(e.target.value)} placeholder="Qué comiste (ej: porción de pizza)" style={{ width: "100%", marginBottom: 6, boxSizing: "border-box" }} />
      <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
        <input value={k} onChange={e => setK(e.target.value)} inputMode="decimal" placeholder="kcal" style={inpN} />
        <input value={p} onChange={e => setP(e.target.value)} inputMode="decimal" placeholder="prot" style={inpN} />
        <input value={c} onChange={e => setC(e.target.value)} inputMode="decimal" placeholder="carb" style={inpN} />
        <input value={f} onChange={e => setF(e.target.value)} inputMode="decimal" placeholder="grasa" style={inpN} />
      </div>
      <button className="btn" onClick={submit} style={{ width: "100%", background: "linear-gradient(135deg,#00E5A0,#00B871)", color: "#0B1120", border: "none", borderRadius: 8, padding: "9px", fontSize: 13, fontWeight: 800 }}>+ Agregar al día</button>
    </div>
  );
}

function App() {
  const defaults = {};
  const zeroDefaults = {};
  Object.values(MEALS).forEach(meal => {
    meal.sections.forEach(s => {
      defaults[s.key] = s.default;
      const zero = s.options.find(o => o.kcal === 0);
      zeroDefaults[s.key] = zero ? zero.id : s.default;

        const MAX = 1280; let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { if (w >= h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }

          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;

          { role: "system", content: AI_SYSTEM_PROMPT + "\n\n" + DIA_TIPICO_TEXTO + "\nReglas dia tipico: si el usuario dice 'lo de siempre' / 'mi dia normal' / 'como siempre', o no aclara cantidades, usa las de su dia tipico. Si solo describe algunas comidas, carga SOLO esas (el resto en 'nada'). Si describe algo distinto al tipico, respeta lo que dice.\n\nCATALOGO (elegi un id por cada key):\n" + JSON.stringify(catalogo) },

        ],
        response_format: { type: "json_schema", json_schema: { name: "dia", strict: true, schema } }
      };

      });

        return (
          <div key={mealKey} style={s.meal}>

                  <span style={{ color: "#FFD93D" }}>{Math.round(mt.c)}</span><span style={{ opacity: 0.4 }}>c </span>

            </div>
            {meal.sections.map(section => {
              const visible = section.options.filter(o => optVisible(o, section.key));
              return (
                <div key={section.key}>
                  <div style={s.secLabel}>{section.label}</div>
                  <div style={s.optGrid}>
                    {visible.length === 0 ? (
                      <div style={{ fontSize: 11, color: "#8899BB", fontStyle: "italic" }}>Sin resultados</div>

                      const isActive = sel[section.key] === opt.id;
                      const optColor = sectionColors[section.key];
                      return (
                        <div key={opt.id} className="chip"
                          style={{
                            ...s.opt(isActive, optColor),
                            ...(opt.ref ? { opacity: isActive ? 0.85 : 0.4, borderStyle: "dashed" } : {}),
                            ...(opt.tag === "v4" ? { borderStyle: isActive ? "solid" : "dotted", borderColor: isActive ? "#FF8C42" : "#FF8C4266" } : {})
                          }}
                          onClick={() => update(section.key, opt.id)}>
                          {opt.ref && <span style={{ fontSize: 8, color: "#FF8C42", marginRight: 3, fontWeight: 700 }}>REF</span>}
                          {opt.tag === "v4" && <span style={s.v4badge}>V4</span>}
                          {opt.label}
                          <span style={{ opacity: 0.5, marginLeft: 4, fontSize: 10 }}>{opt.kcal > 0 ? opt.kcal : ""}</span>
                          <span style={{ opacity: 0.4, marginLeft: 2, fontSize: 9 }}>{opt.p > 0 ? Math.round(opt.p) + "p" : ""}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );

      {/* ===== COMIDAS LIBRES ===== */}
      <div style={s.meal}>

              <div style={{ fontSize: 10, color: "#8899BB" }}><span style={{ color: "#FF8C42" }}>{e.kcal}</span>kcal · {Math.round(e.p)}p {Math.round(e.c)}c {Math.round(e.f)}g</div>
            </div>

          borderRadius: 10, padding: "13px 16px", fontSize: 14, fontWeight: 800, boxShadow: "0 4px 15px #00E5A022"
        }}>
          {savedFlash ? "✓ Guardado" : "Guardar dia"}

        }}>

        </button>

                      <span style={{ color: "#6C5CE7", marginLeft: 6 }}>{h.p}g</span> P
                      <span style={{ color: "#FFD93D", marginLeft: 6 }}>{h.c}g</span> C
                      <span style={{ color: "#00B8D4", marginLeft: 6 }}>{h.f}g</span> G

                    </div>

                  <button className="btn" onClick={() => deleteDay(h.ts)} style={{
                    background: "transparent", color: "#FF6B6B", border: "1px solid #FF6B6B33",

                  }}>×</button>
                </div>
              ))}
              <div style={{ fontSize: 10, color: "#8899BB", textAlign: "center", marginTop: 6, fontStyle: "italic" }}>Click en un dia para cargarlo</div>

        </div>

            <div style={{ fontSize: 9, color: "#8899BB", fontWeight: 700, letterSpacing: 1 }}>CALORIAS</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: "#FF8C42", lineHeight: 1.1 }}>{R.kcal}</div>
            <div style={{ fontSize: 10, color: "#8899BB" }}>kcal totales</div>
          </div>
          <div style={{ background: "#0B1120", borderRadius: 10, padding: "12px 14px", borderLeft: "3px solid " + R.helmsColor }}>
            <div style={{ fontSize: 9, color: "#8899BB", fontWeight: 700, letterSpacing: 1 }}>PROTEINA</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: R.helmsColor, lineHeight: 1.1 }}>{Math.round(R.p)}<span style={{ fontSize: 14, opacity: 0.6 }}>g</span></div>

        <div style={s.row}>

        </div>
        <div style={s.row}>
          <span style={s.rowLabel}>Grasas</span>

            <span style={s.badge(R.fatZonaColor)}>{R.fatZona}</span>
          </span>
        </div>

        <div style={{ ...s.secLabel, marginTop: 12 }}>Distribucion calorica</div>
        <div style={s.macroBar}>

          <span style={{ color: "#00B8D4" }}>Grasa {R.fatPct}%</span>
        </div>

        <div style={s.divider} />
        <div style={{ ...s.resTitle, fontSize: 15, marginTop: 8 }}>Gasto y Deficit</div>

        {R.gasto ? (
          <>

              <span style={s.rowLabel}>Gasto total (WHOOP)</span>
              <span style={s.rowVal()}>{R.gasto} kcal</span>

            <div style={s.row}>
              <span style={s.rowLabel}>Ingesta</span>
              <span style={s.rowVal("#FF8C42")}>~{R.kcal} kcal</span>
            </div>
            <div style={s.row}>
              <span style={s.rowLabel}>Deficit</span>
              <span style={{ ...s.rowVal(R.defColor), display: "flex", alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
                {R.deficit > 0 ? "~" + R.deficit + " kcal (" + R.deficitPct + "%)" : "+" + Math.abs(R.deficit) + " kcal (superavit)"}
                {R.defZona && <span style={s.badge(R.defColor)}>{R.defZona}</span>}
              </span>
            </div>
            <div style={s.row}>
              <span style={s.rowLabel}>Perdida estimada</span>
              <span style={s.rowVal(R.defColor)}>~{R.kgSem > 0 ? R.kgSem.toFixed(2) : "0"} kg grasa/sem</span>
            </div>
            {R.eaVal !== null && (
              <div style={s.row}>
                <span style={s.rowLabel}>Disponib. Energetica</span>
                <span style={{ ...s.rowVal(R.eaColor), display: "flex", alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
                  {R.eaVal.toFixed(0)} kcal/kg MLG
                  <span style={s.badge(R.eaColor)}>{R.eaZona}</span>
                </span>
              </div>

        ) : (
          <div style={{ padding: "12px 0", color: "#FF8C42", fontSize: 13 }}>

          </div>

          {R.gkgMLG >= 2.3

            : R.gkgMLG >= 1.8
            ? "Proteina aceptable pero no optima (" + R.gkgMLG.toFixed(1) + " g/kg MLG). Helms recomienda >=2.3."

          <br />
          {R.fatGkg < 0.5
            ? "⚠ Grasa baja (~" + Math.round(R.f) + "g, " + R.fatGkg.toFixed(2) + " g/kg). Riesgo testosterona. Min: 35g/dia."

            ? "Grasa aceptable (~" + Math.round(R.f) + "g). Funcion hormonal basica cubierta."
            : "Grasa adecuada (~" + Math.round(R.f) + "g). Perfil hormonal protegido."
          }
          {R.gasto && R.deficit !== null && (<>
            <br />
            {R.deficitPct > 42
              ? "⚠ Deficit critico (" + R.deficitPct + "%). No sostenible >2-3 semanas."
              : R.deficitPct > 38
              ? "Deficit limite (" + R.deficitPct + "%). Max 4-6 semanas. Monitorea cargas y recovery."
              : R.deficitPct > 30
              ? "Deficit agresivo viable (" + R.deficitPct + "%). Sostenible 4-8 semanas con monitoreo."
              : R.deficitPct > 0
              ? "Deficit conservador (" + R.deficitPct + "%). Sostenible 8-12 semanas."
              : "Sin deficit. Mantenimiento o superavit."
            }
          </>)}
          {R.c < 50 && <><br />{"⚠ Carbos <50g. Posible impacto cognitivo."}</>}
          {R.eaVal !== null && R.eaVal < 25 && <><br />{"⚠ Disponibilidad energetica baja. Zona RED-S."}</>}
        </div>

        <div style={{ marginTop: 12, padding: "10px 12px", background: "#0B1120", borderRadius: 8 }}>

              <span style={{ color: "#FFD93D", fontWeight: 700, textAlign: "center" }}>prot</span>
              <span>Pechuga 200g</span><span style={{ textAlign: "center" }}>330</span><span style={{ textAlign: "center" }}>62g</span>
              <span>Whey 75g (2.5 scoops)</span><span style={{ textAlign: "center" }}>300</span><span style={{ textAlign: "center" }}>62g</span>
              <span>Pechuga 180g</span><span style={{ textAlign: "center" }}>297</span><span style={{ textAlign: "center" }}>56g</span>
              <span>Whey 60g (2 scoops)</span><span style={{ textAlign: "center" }}>240</span><span style={{ textAlign: "center" }}>50g</span>
              <span>Pechuga 160g</span><span style={{ textAlign: "center" }}>264</span><span style={{ textAlign: "center" }}>50g</span>
              <span>2 huevos + 8 claras</span><span style={{ textAlign: "center" }}>280</span><span style={{ textAlign: "center" }}>41g</span>
              <span>Pechuga 100g</span><span style={{ textAlign: "center" }}>165</span><span style={{ textAlign: "center" }}>31g</span>
              <span>Whey 30g (1 scoop)</span><span style={{ textAlign: "center" }}>120</span><span style={{ textAlign: "center" }}>25g</span>
              <span>1 huevo + 4 claras</span><span style={{ textAlign: "center" }}>140</span><span style={{ textAlign: "center" }}>21g</span>
              <span style={{ color: "#00B8D4", fontWeight: 600, gridColumn: "1 / -1", paddingTop: 4 }}>ATUN (en agua)</span>
              <span>Atun 200g</span><span style={{ textAlign: "center" }}>232</span><span style={{ textAlign: "center" }}>52g</span>
              <span>Atun 180g</span><span style={{ textAlign: "center" }}>209</span><span style={{ textAlign: "center" }}>47g</span>
              <span>Atun 160g</span><span style={{ textAlign: "center" }}>186</span><span style={{ textAlign: "center" }}>42g</span>
              <span>Atun 100g</span><span style={{ textAlign: "center" }}>116</span><span style={{ textAlign: "center" }}>26g</span>
              <span style={{ color: "#FF8C42", fontWeight: 600, gridColumn: "1 / -1", paddingTop: 4 }}>SOLO CLARAS</span>
              <span>17 claras</span><span style={{ textAlign: "center" }}>289</span><span style={{ textAlign: "center" }}>61g</span>
              <span>16 claras</span><span style={{ textAlign: "center" }}>272</span><span style={{ textAlign: "center" }}>58g</span>
              <span>14 claras</span><span style={{ textAlign: "center" }}>238</span><span style={{ textAlign: "center" }}>50g</span>
              <span>9 claras</span><span style={{ textAlign: "center" }}>153</span><span style={{ textAlign: "center" }}>32g</span>
              <span style={{ color: "#FF6B6B", fontWeight: 600, gridColumn: "1 / -1", paddingTop: 4 }}>PULPA VACA (magra, cocida)</span>
              <span>Pulpa 200g</span><span style={{ textAlign: "center" }}>430</span><span style={{ textAlign: "center" }}>60g</span>
              <span>Pulpa 180g</span><span style={{ textAlign: "center" }}>387</span><span style={{ textAlign: "center" }}>54g</span>
              <span>Pulpa 160g</span><span style={{ textAlign: "center" }}>344</span><span style={{ textAlign: "center" }}>48g</span>
              <span>Pulpa 100g</span><span style={{ textAlign: "center" }}>215</span><span style={{ textAlign: "center" }}>30g</span>
              <span style={{ color: "#FF8C42", fontWeight: 600, gridColumn: "1 / -1", paddingTop: 4 }}>V4 - NUEVAS</span>
              <span>Queso descrem. 120g</span><span style={{ textAlign: "center" }}>240</span><span style={{ textAlign: "center" }}>24g</span>
              <span>Queso descrem. 100g</span><span style={{ textAlign: "center" }}>200</span><span style={{ textAlign: "center" }}>20g</span>
              <span>Queso descrem. 70g</span><span style={{ textAlign: "center" }}>140</span><span style={{ textAlign: "center" }}>14g</span>
              <span>Legumbres 180g</span><span style={{ textAlign: "center" }}>230</span><span style={{ textAlign: "center" }}>16g</span>
              <span>Legumbres 160g</span><span style={{ textAlign: "center" }}>200</span><span style={{ textAlign: "center" }}>14g</span>
              <span>Ricota magra 150g</span><span style={{ textAlign: "center" }}>120</span><span style={{ textAlign: "center" }}>14g</span>
              <span>Tofu 150g</span><span style={{ textAlign: "center" }}>120</span><span style={{ textAlign: "center" }}>13g</span>
              <span>8 claras + 2 yemas</span><span style={{ textAlign: "center" }}>246</span><span style={{ textAlign: "center" }}>38g</span>
              <span>6 claras + 2 yemas</span><span style={{ textAlign: "center" }}>210</span><span style={{ textAlign: "center" }}>29g</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{ textAlign: "center", fontSize: 10, color: "#1A2744", marginTop: 20 }}>
        Pechuga: 165kcal/100g, 31g prot | Atun: 116kcal/100g, 26g prot | Whey: 30g=120kcal, 25g prot | Clara: 17kcal, 3.6g prot | MLG=56.5kg
      </div>

      {/* ===== CHAT IA (abajo de todo) ===== */}
      <div style={{ marginTop: 24, background: "#131D35", border: "1.5px solid #6C5CE7", borderRadius: 12, overflow: "hidden" }}>
        <div onClick={() => setShowChat(!showChat)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", cursor: "pointer", userSelect: "none" }}>
          <div style={{ fontSize: 14, fontWeight: 800, color: "#fff" }}>💬 Asistente <span style={{ fontSize: 10, color: "#8899BB", fontWeight: 500 }}>· hablale natural</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span onClick={e => { e.stopPropagation(); setShowChat(true); setShowGastoIA(true); }} title="Gasto en IA de hoy — tocá para el detalle" style={{ fontSize: 11, fontWeight: 700, color: "#00E5A0", background: "#00E5A018", border: "1px solid #00E5A044", padding: "2px 8px", borderRadius: 6 }}>💵 ${gastoHoyUSD().toFixed(3)}</span>
            <span style={{ color: "#8899BB", fontSize: 12 }}>{showChat ? "▲" : "▼"}</span>
          </div>
        </div>
        {showChat && (
          <div style={{ padding: "0 12px 12px" }} className="fade-in">
            {showGastoIA && (
              <div className="fade-in" style={{ marginBottom: 8, padding: "10px 12px", background: "#0B1120", borderRadius: 8, border: "1px solid #00E5A033" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: "#00E5A0" }}>💵 Gasto en IA</div>
                  <button className="btn" onClick={() => setShowGastoIA(false)} style={{ background: "transparent", border: "1px solid #1A2744", borderRadius: 6, color: "#8899BB", padding: "3px 8px", fontSize: 12 }}>✕</button>
                </div>
                {Object.keys(gastoIA).length === 0 ? (
                  <div style={{ fontSize: 11, color: "#8899BB", fontStyle: "italic" }}>Todavía no gastaste nada. Cada mensaje al chat suma acá.</div>
                ) : (
                  <div>
                    {Object.keys(gastoIA).sort().reverse().slice(0, 14).map(fecha => {
                      const dia = gastoIA[fecha];
                      const totalDia = Object.values(dia).reduce((s, m) => s + (m.usd || 0), 0);
                      return (
                        <div key={fecha} style={{ marginBottom: 6, paddingBottom: 6, borderBottom: "1px solid #1A274433" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                            <span style={{ color: "#C8D6E5", fontWeight: 700 }}>{fecha}</span>
                            <span style={{ color: "#00E5A0", fontWeight: 800 }}>${totalDia.toFixed(4)}</span>
                          </div>
                          {Object.entries(dia).map(([mid, m]) => (
                            <div key={mid} style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#8899BB", paddingLeft: 6 }}>
                              <span>{labelModelo(mid)} · {m.n} msj</span>
                              <span>${m.usd.toFixed(4)}</span>
                            </div>
                          ))}
                        </div>
                      );
                    })}
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginTop: 4 }}>
                      <span style={{ color: "#8899BB", fontWeight: 700 }}>TOTAL acumulado</span>
                      <span style={{ color: "#FFD93D", fontWeight: 800 }}>${Object.values(gastoIA).reduce((s, dia) => s + Object.values(dia).reduce((a, m) => a + (m.usd || 0), 0), 0).toFixed(4)}</span>
                    </div>
                  </div>
                )}
                <details style={{ marginTop: 8 }}>
                  <summary style={{ fontSize: 11, color: "#6C5CE7", fontWeight: 700, cursor: "pointer", userSelect: "none" }}>⚙️ Precios (USD por millón de tokens)</summary>
                  <div style={{ marginTop: 6 }}>
                    {CHAT_MODELS.map(mod => {
                      const p = preciosIA[mod.id] || { in: 0, out: 0 };
                      return (
                        <div key={mod.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, fontSize: 10 }}>
                          <span style={{ flex: 1, color: "#C8D6E5" }}>{mod.label.split(' ·')[0]}</span>
                          <span style={{ color: "#8899BB" }}>in</span>
                          <input type="number" step="0.01" value={p.in} onChange={e => setPreciosIA(prev => ({ ...prev, [mod.id]: { in: +e.target.value || 0, out: (prev[mod.id] || {}).out || 0 } }))} style={{ width: 54, background: "#0B1120", color: "#fff", border: "1px solid #1A2744", borderRadius: 4, padding: "3px 4px", fontSize: 10, textAlign: "center" }} />
                          <span style={{ color: "#8899BB" }}>out</span>
                          <input type="number" step="0.01" value={p.out} onChange={e => setPreciosIA(prev => ({ ...prev, [mod.id]: { in: (prev[mod.id] || {}).in || 0, out: +e.target.value || 0 } }))} style={{ width: 54, background: "#0B1120", color: "#fff", border: "1px solid #1A2744", borderRadius: 4, padding: "3px 4px", fontSize: 10, textAlign: "center" }} />
                        </div>
                      );
                    })}
                  </div>
                </details>
              </div>
            )}
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 8 }}>
              <select value={chatModel} onChange={e => setChatModel(e.target.value)} style={{ flex: 1, background: "#0B1120", color: "#fff", border: "1.5px solid #1A2744", borderRadius: 6, padding: "6px 8px", fontSize: 12 }}>
                {CHAT_MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
              <button className="btn" onClick={() => setShowChatCfg(!showChatCfg)} title="API key" style={{ background: "transparent", border: "1px solid #1A2744", borderRadius: 6, color: anthropicKey ? "#00E5A0" : "#FF8C42", padding: "5px 9px", fontSize: 13 }}>⚙️</button>
              {chatMsgs.length > 0 && <button className="btn" onClick={() => setChatMsgs([])} title="Limpiar chat" style={{ background: "transparent", border: "1px solid #1A2744", borderRadius: 6, color: "#8899BB", padding: "5px 9px", fontSize: 13 }}>🗑</button>}
            </div>
            {showChatCfg && (
              <div style={{ marginBottom: 8, padding: "8px 10px", background: "#0B1120", borderRadius: 8 }}>
                <div style={{ fontSize: 10, color: "#8899BB", marginBottom: 4 }}>API key de Anthropic (para Haiku/Sonnet). Se guarda solo en tu PC.</div>
                <input type="password" value={anthropicKey} onChange={e => setAnthropicKey(e.target.value)} placeholder="sk-ant-..." style={{ width: "100%", boxSizing: "border-box" }} />
                <div style={{ fontSize: 10, color: "#8899BB", marginTop: 4 }}>Los modelos GPT usan tu key de OpenAI (panel ☁️ → 🔑).</div>
                <div style={{ height: 1, background: "#1A2744", margin: "8px 0" }} />
                <div style={{ fontSize: 11, fontWeight: 700, color: "#6C5CE7", marginBottom: 4 }}>🧠 Lo que aprendió ({chatMemoria.length})</div>
                {chatMemoria.length === 0 ? <div style={{ fontSize: 10, color: "#8899BB", fontStyle: "italic" }}>Nada todavía. Corregilo o contale algo y lo va a recordar.</div> : chatMemoria.map(m => (
                  <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, fontSize: 11, color: "#C8D6E5", padding: "3px 0", borderBottom: "1px solid #1A274433" }}>
                    <span style={{ flex: 1 }}>{m.texto}</span>
                    <button className="btn" onClick={() => setChatMemoria(prev => prev.filter(x => x.id !== m.id))} title="Olvidar" style={{ background: "transparent", color: "#FF6B6B", border: "none", fontSize: 14, fontWeight: 700, padding: "0 4px" }}>×</button>
                  </div>
                ))}
              </div>
            )}
            <div style={{ background: "#0B1120", borderRadius: 8, padding: 10, height: 220, overflowY: "auto", marginBottom: 8 }}>
              {chatMsgs.length === 0 && <div style={{ fontSize: 12, color: "#8899BB", textAlign: "center", marginTop: 70, lineHeight: 1.7 }}>Probá:<br />"comí un alfajor"<br />"¿cómo voy hoy?"<br />"cargá mi día típico"<br />"poné el gasto en 2400"</div>}
              {chatMsgs.map((m, i) => (
                <div key={i} style={{ display: "flex", justifyContent: m.role === 'user' ? "flex-end" : "flex-start", marginBottom: 8 }}>
                  <div style={{ maxWidth: "82%", padding: "8px 11px", borderRadius: 10, fontSize: 13, lineHeight: 1.4, whiteSpace: "pre-wrap", background: m.role === 'user' ? "#6C5CE7" : "#1A2744", color: "#fff" }}>
                    {m.imgs && m.imgs.length > 0 && (
                      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: m.text ? 6 : 0 }}>
                        {m.imgs.map(im => <img key={im.id} src={im.url} alt="captura" style={{ maxWidth: 150, maxHeight: 150, borderRadius: 6, display: "block" }} />)}
                      </div>
                    )}
                    {m.text}
                  </div>
                </div>
              ))}
              {chatBusy && <div style={{ fontSize: 12, color: "#8899BB", fontStyle: "italic" }}>pensando…</div>}
              <div ref={chatEndRef} />
            </div>
            {chatErr && <div style={{ fontSize: 12, color: "#FF6B6B", marginBottom: 8, padding: "6px 8px", background: "#FF6B6B11", borderRadius: 6 }}>{chatErr}</div>}
            {chatImgs.length > 0 && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
                {chatImgs.map(im => (
                  <div key={im.id} style={{ position: "relative" }}>
                    <img src={im.url} alt="adjunto" style={{ width: 54, height: 54, objectFit: "cover", borderRadius: 8, border: "1px solid #2A3A5A" }} />
                    <button onClick={() => setChatImgs(prev => prev.filter(x => x.id !== im.id))} title="Quitar" style={{ position: "absolute", top: -7, right: -7, background: "#FF6B6B", color: "#fff", border: "none", borderRadius: "50%", width: 19, height: 19, fontSize: 12, fontWeight: 700, lineHeight: 1, cursor: "pointer", padding: 0 }}>×</button>
                  </div>
                ))}
              </div>
            )}
            <div style={{ display: "flex", gap: 6 }}>
              <input ref={chatFileRef} type="file" accept="image/*" multiple onChange={e => { addChatImgs(e.target.files); e.target.value = ''; }} style={{ display: "none" }} />
              <button className="btn" onClick={() => chatFileRef.current && chatFileRef.current.click()} disabled={chatBusy} title="Adjuntar captura o foto" style={{ background: "transparent", color: "#6C5CE7", border: "1.5px solid #6C5CE7", borderRadius: 8, padding: "0 12px", fontSize: 18, fontWeight: 700, opacity: chatBusy ? 0.6 : 1 }}>📎</button>
              <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') chatSend(); }} onPaste={e => { const items = e.clipboardData && e.clipboardData.items; if (items) { const fs = []; for (let i = 0; i < items.length; i++) { if (items[i].type && items[i].type.indexOf('image') === 0) { const f = items[i].getAsFile(); if (f) fs.push(f); } } if (fs.length) { e.preventDefault(); addChatImgs(fs); } } }} placeholder="Escribile o pegá una captura…" style={{ flex: 1, boxSizing: "border-box" }} />
              <button className="btn" onClick={chatSend} disabled={chatBusy} style={{ background: chatBusy ? "#1A2744" : "linear-gradient(135deg,#6C5CE7,#4834d4)", color: "#fff", border: "none", borderRadius: 8, padding: "0 16px", fontSize: 16, fontWeight: 800, opacity: chatBusy ? 0.6 : 1 }}>➤</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').catch(function (e) { console.warn('SW no registrado:', e); });
  });
}
</script>
</body>
</html>
